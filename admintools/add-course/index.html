<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הוספת קורס – קורסילנד אדמין</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #9B30E8;
    --blue: #3B6FF0;
    --grad: linear-gradient(135deg, #9B30E8 0%, #5B52F0 50%, #3B6FF0 100%);
    --grad-soft: linear-gradient(135deg, rgba(155,48,232,0.10) 0%, rgba(59,111,240,0.10) 100%);
    --bg: #F7F6FD;
    --surface: #FFFFFF;
    --text: #1A1330;
    --muted: #7A6E99;
    --border: rgba(155,48,232,0.15);
    --border-focus: rgba(155,48,232,0.5);
    --shadow: 0 8px 32px rgba(91,82,240,0.12);
    --success: #16a34a;
    --error: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* NAV */
  nav {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    padding: 0 2rem;
  }
  .nav-inner {
    max-width: 860px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo-text {
    font-size: 1.2rem; font-weight: 800;
    background: var(--grad);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .nav-badge {
    font-size: 0.68rem; font-weight: 700;
    background: var(--grad); color: #fff;
    padding: 0.18rem 0.5rem; border-radius: 50px;
    margin-right: 0.5rem;
  }
  .back-link {
    color: var(--muted); text-decoration: none;
    font-size: 0.85rem; font-weight: 600;
    display: flex; align-items: center; gap: 0.3rem;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--purple); }

  /* LAYOUT */
  .page {
    max-width: 860px; margin: 0 auto;
    padding: 2.5rem 1.5rem 5rem;
  }
  .page-header { margin-bottom: 2rem; }
  .page-header h1 {
    font-size: 1.9rem; font-weight: 900;
    background: var(--grad);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: -0.5px;
    margin-bottom: 0.3rem;
  }
  .page-header p { font-size: 0.9rem; color: var(--muted); }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem 2rem;
    box-shadow: var(--shadow);
  }

  /* SERVER STATUS */
  #server-status {
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    color: var(--error);
    font-size: 0.88rem;
    line-height: 1.6;
  }
  #server-status code {
    background: #fee2e2; border-radius: 6px;
    padding: 0.1rem 0.4rem; font-family: monospace;
    font-size: 0.9em;
  }

  /* FORM */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem 1.5rem;
  }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 0.82rem; font-weight: 700;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px;
  }
  label .req { color: var(--purple); margin-right: 2px; }
  label .opt { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 0.8rem; }

  input[type="text"],
  input[type="url"],
  input[type="number"],
  textarea,
  select {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 0.9rem;
    font-family: 'Heebo', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: rtl;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(155,48,232,0.1);
    background: #fff;
  }
  textarea { resize: vertical; min-height: 90px; }

  /* Price wrapper */
  .price-wrap { position: relative; }
  .price-wrap input { padding-right: 2.2rem; }
  .price-prefix {
    position: absolute; right: 0.85rem; top: 50%;
    transform: translateY(-50%);
    font-size: 1rem; font-weight: 700; color: var(--purple);
    pointer-events: none;
  }

  /* Image preview */
  .img-preview {
    width: 100%; max-width: 240px;
    height: 130px; object-fit: cover;
    border-radius: 10px; border: 1.5px solid var(--border);
    margin-top: 0.6rem;
    display: none;
    background: var(--bg);
  }

  /* New category input */
  #new-category-wrap {
    display: none; margin-top: 0.5rem;
  }

  /* SUBMIT */
  .submit-row {
    margin-top: 2rem;
    display: flex; align-items: center; gap: 1rem;
    flex-wrap: wrap;
  }
  .btn-submit {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--grad); color: #fff;
    border: none; cursor: pointer;
    font-family: 'Heebo', sans-serif;
    font-size: 1rem; font-weight: 700;
    padding: 0.85rem 2.2rem;
    border-radius: 50px;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 16px rgba(155,48,232,0.3);
  }
  .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-submit .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  #toast {
    display: none;
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    z-index: 999;
    background: var(--success);
    color: #fff;
    padding: 1rem 2rem;
    border-radius: 50px;
    font-size: 0.95rem; font-weight: 700;
    box-shadow: 0 8px 30px rgba(22,163,74,0.35);
    animation: slideUp 0.3s ease;
    text-align: center;
    white-space: nowrap;
  }
  #toast.error { background: var(--error); box-shadow: 0 8px 30px rgba(220,38,38,0.35); }
  @keyframes slideUp { from { bottom: 0; opacity: 0; } to { bottom: 2rem; opacity: 1; } }

  /* SECTION DIVIDER */
  .section-title {
    font-size: 0.75rem; font-weight: 700; color: var(--purple);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin: 1.8rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .section-title:first-child { margin-top: 0; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .page { padding: 1.5rem 1rem 4rem; }
    .card { padding: 1.5rem 1.2rem; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div style="display:flex;align-items:center;">
      <span class="logo-text">קורסילנד</span>
      <span class="nav-badge">ADMIN</span>
    </div>
    <a href="../index.html" class="back-link">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      כלי אדמין
    </a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>📚 הוספת קורס לקטלוג</h1>
    <p>מלא את הפרטים ולחץ "הוסף קורס" — הקורס יתווסף ויועלה לגיטהאב אוטומטית</p>
  </div>

  <div id="server-status">
    ⚠️ השרת המקומי אינו פועל.<br>
    הפעל אותו בטרמינל עם הפקודה:<br><br>
    <code>node admintools/add-course/server.js</code><br><br>
    לאחר מכן פתח: <code>http://localhost:3131</code>
  </div>

  <div class="card">
    <form id="course-form" novalidate>

      <div class="section-title">פרטי הקורס</div>
      <div class="form-grid">

        <div class="form-group full">
          <label>שם הקורס <span class="req">*</span></label>
          <input type="text" id="title" placeholder="למשל: מיינדסט עושר – 30 יום לשינוי" required>
        </div>

        <div class="form-group">
          <label>שם המנחה <span class="req">*</span></label>
          <input type="text" id="instructor" placeholder="למשל: ד״ר רונית כהן" required>
        </div>

        <div class="form-group">
          <label>קטגוריה <span class="req">*</span></label>
          <select id="category" required>
            <option value="">טוען קטגוריות...</option>
          </select>
          <div id="new-category-wrap">
            <input type="text" id="new-category" placeholder="שם קטגוריה חדשה...">
          </div>
        </div>

        <div class="form-group full">
          <label>תיאור הקורס <span class="req">*</span></label>
          <textarea id="desc" placeholder="תיאור קצר ומשכנע של הקורס..." required></textarea>
        </div>

      </div>

      <div class="section-title">מחיר ואורך</div>
      <div class="form-grid">

        <div class="form-group">
          <label>מחיר <span class="req">*</span></label>
          <div class="price-wrap">
            <span class="price-prefix">₪</span>
            <input type="number" id="price" placeholder="297" min="0" required style="padding-right:2.4rem">
          </div>
        </div>

        <div class="form-group">
          <label>מספר שיעורים <span class="req">*</span></label>
          <input type="text" id="duration" placeholder='למשל: 10 שיעורים' required>
        </div>

      </div>

      <div class="section-title">קישורים ומדיה</div>
      <div class="form-grid">

        <div class="form-group full">
          <label>קישור לדף המכירה <span class="opt">(אופציונלי)</span></label>
          <input type="url" id="link" placeholder="https://...">
        </div>

        <div class="form-group full">
          <label>קישור לתמונה <span class="opt">(URL — ריק = תמונה ברירת מחדל)</span></label>
          <input type="url" id="img" placeholder="https://images.unsplash.com/...">
          <img id="img-preview" class="img-preview" alt="תצוגה מקדימה">
        </div>

      </div>

      <div class="submit-row">
        <button type="submit" class="btn-submit" id="submit-btn">
          <span class="spinner" id="spinner"></span>
          <span id="btn-text">הוסף קורס ⬆️</span>
        </button>
      </div>

    </form>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:3131';
const DEFAULT_IMG = 'https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=600&q=80';

async function loadCategories() {
  try {
    const res = await fetch(`${API}/api/courses`);
    if (!res.ok) throw new Error();
    const courses = await res.json();
    const cats = [...new Set(courses.map(c => c.category).filter(Boolean))].sort();

    const sel = document.getElementById('category');
    sel.innerHTML = '<option value="">בחר קטגוריה...</option>';
    cats.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat;
      opt.textContent = cat;
      sel.appendChild(opt);
    });
    const newOpt = document.createElement('option');
    newOpt.value = '__new__';
    newOpt.textContent = '➕ הוסף קטגוריה חדשה';
    sel.appendChild(newOpt);
  } catch {
    document.getElementById('server-status').style.display = 'block';
    const sel = document.getElementById('category');
    sel.innerHTML = '<option value="">שרת לא זמין</option>';
  }
}

document.getElementById('category').addEventListener('change', function () {
  const wrap = document.getElementById('new-category-wrap');
  wrap.style.display = this.value === '__new__' ? 'block' : 'none';
  if (this.value === '__new__') document.getElementById('new-category').focus();
});

document.getElementById('img').addEventListener('input', function () {
  const preview = document.getElementById('img-preview');
  const url = this.value.trim();
  if (url) {
    preview.src = url;
    preview.style.display = 'block';
    preview.onerror = () => { preview.style.display = 'none'; };
  } else {
    preview.style.display = 'none';
  }
});

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'error' : '';
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 4500);
}

function setLoading(on) {
  const btn = document.getElementById('submit-btn');
  const spinner = document.getElementById('spinner');
  const text = document.getElementById('btn-text');
  btn.disabled = on;
  spinner.style.display = on ? 'block' : 'none';
  text.textContent = on ? 'מעלה לגיטהאב...' : 'הוסף קורס ⬆️';
}

document.getElementById('course-form').addEventListener('submit', async function (e) {
  e.preventDefault();

  const title = document.getElementById('title').value.trim();
  const instructor = document.getElementById('instructor').value.trim();
  const desc = document.getElementById('desc').value.trim();
  const priceNum = document.getElementById('price').value.trim();
  const duration = document.getElementById('duration').value.trim();
  const link = document.getElementById('link').value.trim();
  const imgVal = document.getElementById('img').value.trim();

  const catSel = document.getElementById('category');
  let category = catSel.value;
  if (category === '__new__') {
    category = document.getElementById('new-category').value.trim();
  }

  if (!title || !instructor || !desc || !priceNum || !duration || !category) {
    showToast('⚠️ יש למלא את כל השדות הנדרשים', true);
    return;
  }

  const course = {
    title,
    desc,
    category,
    price: '₪' + priceNum,
    duration,
    instructor,
    img: imgVal || DEFAULT_IMG
  };
  if (link) course.link = link;

  setLoading(true);
  try {
    const res = await fetch(`${API}/api/add-course`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(course)
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      throw new Error(data.error || 'שגיאה לא ידועה');
    }

    showToast(`✅ הקורס "${title}" נוסף בהצלחה! (ID: ${data.id})`);
    document.getElementById('course-form').reset();
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('new-category-wrap').style.display = 'none';
    loadCategories();
  } catch (err) {
    showToast('❌ שגיאה: ' + err.message, true);
  } finally {
    setLoading(false);
  }
});

loadCategories();
</script>
</body>
</html>
